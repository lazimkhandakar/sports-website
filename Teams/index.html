<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports Teams Directory — Northfield University</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       NAVBAR
  ══════════════════════════════════════════ -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="../Home page/index.html" class="nav-brand">
        <div class="nav-logo-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect width="40" height="40" rx="5" fill="rgba(255,255,255,0.12)"/>
            <path d="M20 7L23.5 16H33L25.5 21.5L28.5 31L20 25.5L11.5 31L14.5 21.5L7 16H16.5L20 7Z" fill="white" opacity="0.9"/>
            <rect x="11" y="31" width="18" height="2" rx="1" fill="white" opacity="0.4"/>
          </svg>
        </div>
        <div class="nav-brand-text">
          <span class="nav-brand-main">NORTHFIELD</span>
          <span class="nav-brand-sub">UNIVERSITY</span>
        </div>
      </a>

      <ul class="nav-links" id="navLinks">
        <li><a href="../Home page/index.html">Home</a></li>
        <li><a href="../Fixtures page/index.html">Fixtures</a></li>
        <li><a href="../Players page/index.html">Players</a></li>
        <li><a href="index.html" class="active">Teams</a></li>
        <li><a href="#">Results</a></li>
        <li><a href="#">About</a></li>
      </ul>

      <div class="nav-actions">
        <button class="nav-icon-btn" aria-label="Search" id="searchBtn">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <button class="nav-icon-btn" aria-label="Account">
          <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ══════════════════════════════════════════
       PAGE HERO BANNER
  ══════════════════════════════════════════ -->
  <div class="page-banner">
    <div class="container">
      <div class="banner-inner">
        <div>
          <h1 class="banner-title">Sports Teams Directory</h1>
          <p class="banner-sub">Browse all university sports teams by department or sport.</p>
        </div>
        <div class="banner-crest" aria-hidden="true">
          <svg width="110" height="110" viewBox="0 0 110 110" fill="none">
            <path d="M55 8L62 28H84L67 40L74 60L55 48L36 60L43 40L26 28H48L55 8Z" fill="rgba(255,255,255,0.18)"/>
            <circle cx="55" cy="55" r="48" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
            <circle cx="55" cy="55" r="38" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <text x="55" y="88" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="700" fill="rgba(255,255,255,0.3)" letter-spacing="2">NORTHFIELD</text>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       BREADCRUMB
  ══════════════════════════════════════════ -->
  <div class="breadcrumb-bar">
    <div class="container">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <a href="../Home page/index.html">Home</a>
        <span class="bc-sep">›</span>
        <a href="index.html">Teams</a>
        <span class="bc-sep">›</span>
        <span class="bc-current">Directory</span>
      </nav>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       MAIN
  ══════════════════════════════════════════ -->
  <main class="main">
    <div class="container">

      <!-- Search + Filter Bar -->
      <div class="filter-bar">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search teams by name or captain..." />
        </div>

        <div class="filter-group">
          <div class="filter-field">
            <label class="filter-label">Filter by Sport</label>
            <div class="select-wrap">
              <select id="sportFilter" class="filter-select">
                <option value="">All Sports</option>
                <option value="Football">Football</option>
                <option value="Basketball">Basketball</option>
                <option value="Volleyball">Volleyball</option>
                <option value="Cricket">Cricket</option>
                <option value="Hockey">Hockey</option>
                <option value="Swimming">Swimming</option>
                <option value="Track & Field">Track &amp; Field</option>
                <option value="Rugby">Rugby</option>
                <option value="Tennis">Tennis</option>
                <option value="Badminton">Badminton</option>
                <option value="Table Tennis">Table Tennis</option>
                <option value="Golf">Golf</option>
              </select>
              <svg class="select-chevron" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>

          <div class="filter-field">
            <label class="filter-label">Filter by Department</label>
            <div class="select-wrap">
              <select id="deptFilter" class="filter-select">
                <option value="">All Departments</option>
                <option value="Kinesiology">Department of Kinesiology</option>
                <option value="Physical Education">Department of Physical Education</option>
                <option value="Management Studies">Department of Management Studies</option>
                <option value="Computer Science">Department of Computer Science</option>
              </select>
              <svg class="select-chevron" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>

          <button class="clear-btn" id="clearBtn">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
            Clear Filters
          </button>
        </div>
      </div>

      <!-- Results Bar -->
      <div class="results-bar">
        <span class="showing-text" id="showingText">Showing 1–12 of 24 teams</span>
        <div class="results-right">
          <!-- View toggle -->
          <div class="view-toggle">
            <button class="view-btn active" id="gridViewBtn" title="Grid view">
              <svg width="15" height="15" fill="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            </button>
            <button class="view-btn" id="listViewBtn" title="List view">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </button>
          </div>
          <!-- Sort -->
          <div class="sort-wrap">
            <div class="select-wrap">
              <select id="sortSelect" class="sort-select">
                <option value="name-asc">Sort by: Team Name (A-Z)</option>
                <option value="name-desc">Sort by: Team Name (Z-A)</option>
                <option value="players-desc">Sort by: Most Players</option>
                <option value="wins-desc">Sort by: Most Wins</option>
              </select>
              <svg class="select-chevron" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
        </div>
      </div>

      <!-- Teams Grid -->
      <div class="teams-grid" id="teamsGrid">
        <!-- Populated by JS -->
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-icon">🔍</div>
        <p class="empty-title">No teams found</p>
        <p class="empty-sub">Try adjusting your search or filter criteria.</p>
        <button class="clear-btn" onclick="document.getElementById('clearBtn').click()">Clear Filters</button>
      </div>

      <!-- Pagination -->
      <div class="pagination-wrap" id="paginationWrap">
        <div class="pagination" id="pagination">
          <!-- Injected by JS -->
        </div>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
